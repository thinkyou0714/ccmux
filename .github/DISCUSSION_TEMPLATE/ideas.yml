title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share an idea for ccmux. Discussion welcome before opening a feature request issue.
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What workflow are you trying to support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Rough proposal
      description: How might ccmux implement this? Sketch is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Existing alternatives
      description: Are you using another tool today? What works or does not?
  - type: dropdown
    id: scope
    attributes:
      label: Scope guess
      options:
        - Small (one command flag)
        - Medium (new subcommand)
        - Large (architectural change)
        - Not sure
    validations:
      required: true
