name: "ccmux CodeQL config"

# Keep the broad, high-signal query set.
queries:
  - uses: security-extended

query-filters:
  # ccmux's POST /webhook/github endpoint deliberately turns an authenticated
  # GitHub "issues" webhook into an autonomous agent session. That is the
  # documented purpose of the feature, and reaching the agent spawn is gated by
  # a MANDATORY HMAC signature (src/integrations/n8n.ts: an unset secret returns
  # 503 and an invalid/missing signature returns 401), so only a holder of the
  # webhook secret can ever trigger it. CodeQL cannot model the HMAC check as
  # the authorization boundary, so it reports the *post-verification* content
  # filters (the X-GitHub-Event allowlist, action == "opened", etc.) as a
  # "user-controlled bypass of a sensitive action". Those filters are hardening,
  # not the security boundary — the HMAC is. This is an accepted, mitigated
  # true-positive for a webhook-orchestration tool, so we exclude that one
  # query. Every other security-extended query (log injection, stack-trace
  # exposure, weak crypto, cert validation, …) still runs and gates the PR.
  - exclude:
      id: js/user-controlled-bypass
