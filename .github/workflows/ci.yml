name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Validate both ends of the supported range (engines: >=22).
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lockfile lint (registry + integrity + https)
        run: npx --yes lockfile-lint@4 --path package-lock.json --type npm --validate-https --validate-integrity --allowed-hosts npm
      - name: Audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
      - name: Audit (all deps, moderate+, advisory)
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Lint (eslint, warnings allowed)
        run: npm run lint
      - name: Typecheck (src + tests)
        run: npm run typecheck
      - name: Build (tsc)
        run: npm run build
      - name: Unit tests
        run: npm test -- --reporter=verbose --reporter=github-actions --exclude "tests/integration/**"
      - name: Integration tests (mock LLM)
        run: npm test -- --reporter=verbose --reporter=github-actions tests/integration
        # The integration suite spawns a stub HTTP server + drives ccmux auto.
        # Keep it separate so a flaky stub never masks unit failures.
        timeout-minutes: 5
